on:
  pull_request:
    branches:
      - develop
  push:
    branches:
      - develop

name: Build and Deploy to dev server

jobs:
  build-push-notify:
    name: Build, deploy, and notify
    uses: bahasa-ai/workflows/.github/workflows/deploy-ssh-notify-lark.yml@main
    with:
      package-name: book-meeting-ai
      deploy-directory: /home/ubuntu/repos/book-meeting-ai
      node-version: 22
      build-files: node_modules .next
      version-script: 'grep -Poi " *\"version\": *\"\K[^\"]*" ./package.json '
      deploy-script: |
        pm2 restart ecosystem.config.js
      target-user: 'ubuntu'
      target-hostname: github:bambon-dev-1@warpgate.bahasalab.com
      group-id: oc_44f7ba3511134d8f11859bf098207774
    secrets:
      build-script: |
        npm install -g pnpm
        pnpm install
        NEXT_PUBLIC_SITE_URL=https://book.audyno.dev.bahasalab.com pnpm run build
      lark-app-id: ${{ secrets.LARK_APP_ID }}
      lark-app-secret: ${{ secrets.LARK_APP_SECRET }}
      ssh-keys: |
        id_ed25519: ${{ toJson(secrets.AWS_DEV_SSH_KEY) }}
